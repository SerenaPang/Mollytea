<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login – MOLLY TEA</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.6.2/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #fff0f3; color: #000; }
  </style>
</head>
<body>
 
  <div th:replace="~{fragments/header :: header}"></div>
 
  <div class="container">
    <div class="row">
      <div class="col-lg-12 mt-4 mb-4">
        <h1>Login</h1>
        <form method="post" th:action="@{/login}">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div class="form-group">
            <label for="username">Phone</label>
            <input required type="text" class="form-control" name="username" id="username" placeholder="Phone">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input required type="password" class="form-control" name="password" id="password" placeholder="Password">
          </div>
          <a type="button" class="btn float-right" href="/oauth2/authorization/google">Login with Google</a>
          <button type="submit" class="btn btn-primary float-right" id="login">Login</button>
        </form>
        <p>Don't have an account? <a href="/signup">Signup now!</a></p>
      </div>
    </div>
  </div>
 
  <div th:replace="~{fragments/footer :: footer}"></div>
  <div th:replace="~{fragments/footer :: scripts}"></div>
 
</body>
</html>
