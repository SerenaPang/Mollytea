<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup – MOLLY TEA</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.6.2/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #fff0f3; color: #000; }
  </style>
</head>
<body>
 
  <div th:replace="~{fragments/header :: header}"></div>
 
  <div class="container">
    <div class="row">
      <div class="col-lg-12 mt-4 mb-4">
        <h1>Signup</h1>
        <form method="post" th:action="@{/signup}">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div class="form-group">
            <label for="phone">Phone</label>
            <input required type="text" class="form-control" name="phone" id="phone" placeholder="Phone">
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input required type="password" class="form-control" name="password" id="password" placeholder="Password">
          </div>
          <div class="form-group">
            <label for="addressLine1">Address Line 1</label>
            <input required type="text" class="form-control" name="addressLine1" id="addressLine1" placeholder="Address Line 1">
          </div>
          <div class="form-group">
            <label for="addressLine2">Address Line 2</label>
            <input type="text" class="form-control" name="addressLine2" id="addressLine2" placeholder="Address Line 2">
          </div>
          <div class="form-group">
            <label for="postcode">Postcode</label>
            <input required type="text" class="form-control" name="postcode" id="postcode" placeholder="Postcode">
          </div>
          <button type="submit" class="btn btn-primary float-right" id="signup">Signup</button>
        </form>
      </div>
    </div>
  </div>
 
  <div th:replace="~{fragments/footer :: footer}"></div>
  <div th:replace="~{fragments/footer :: scripts}"></div>
 
</body>
</html>
