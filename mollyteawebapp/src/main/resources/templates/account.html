<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account – MOLLY TEA</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.6.2/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #fff0f3; color: #000; }
  </style>
</head>
<body>
 
  <div th:replace="~{fragments/header :: header}"></div>
 
  <div class="container">
    <div class="row">
      <div class="col-lg-12 mt-4 mb-4">
        <h1>Account</h1>
        <form method="post" th:action="@{/account}">
          <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
          <div class="form-group">
            <label for="addressLine1">Address Line 1</label>
            <input required type="text" class="form-control" name="addressLine1" id="addressLine1"
                   placeholder="Address Line 1" th:value="${address?.addressLine1}">
          </div>
          <div class="form-group">
            <label for="addressLine2">Address Line 2</label>
            <input type="text" class="form-control" name="addressLine2" id="addressLine2"
                   placeholder="Address Line 2" th:value="${address?.addressLine2}">
          </div>
          <div class="form-group">
            <label for="postcode">Postcode</label>
            <input required type="text" class="form-control" name="postcode" id="postcode"
                   placeholder="Postcode" th:value="${address?.postcode}">
          </div>
          <button type="submit" class="btn btn-primary float-right" id="complete">Update</button>
        </form>
      </div>
    </div>
  </div>
 
  <div th:replace="~{fragments/footer :: footer}"></div>
  <div th:replace="~{fragments/footer :: scripts}"></div>
 
</body>
</html>
