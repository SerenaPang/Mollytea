<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Account – MOLLY TEA</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.6.2/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <!-- Include Header -->
  <div id="header-placeholder"></div>

  <div class="container">
    <div class="row">
      <div class="col-lg-12 mt-4 mb-4">
        <h1>Account</h1>
        <form method="post">
          <div class="form-group">
            <label for="addressLine1">Address Line 1</label>
            <input required type="text" class="form-control" name="addressLine1" id="addressLine1" placeholder="Address Line 1" value="">
          </div>
          <div class="form-group">
            <label for="addressLine2">Address Line 2</label>
            <input type="text" class="form-control" name="addressLine2" id="addressLine2" placeholder="Address Line 2" value="">
          </div>
          <div class="form-group">
            <label for="postcode">Postcode</label>
            <input required type="text" class="form-control" name="postcode" id="postcode" placeholder="Postcode" value="">
          </div>
          <button type="submit" class="btn btn-primary float-right" id="complete">Update</button>
        </form>
      </div>
    </div>
  </div>

  <!-- Include Footer -->
  <div id="footer-placeholder"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/4.6.2/js/bootstrap.bundle.min.js"></script>
  <script>
    fetch('header.html').then(r => r.text()).then(html => document.getElementById('header-placeholder').innerHTML = html);
    fetch('footer.html').then(r => r.text()).then(html => document.getElementById('footer-placeholder').innerHTML = html);
  </script>
</body>
</html>
